<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:sans-serif;
background:#fffaf5;
overflow:hidden;
text-align:center;
}

#cake{
font-size:120px;
cursor:pointer;
position:relative;
user-select:none;
transition:0.2s;
}

.crack{
position:absolute;
top:10%;
left:50%;
transform:translateX(-50%);
font-size:90px;
pointer-events:none;
opacity:0;
transition:0.3s;
}

.shake{
animation:shake 0.25s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.split-left{
transform:translateX(-140px) rotate(-15deg);
opacity:0;
transition:1s;
}

.split-right{
transform:translateX(140px) rotate(15deg);
opacity:0;
transition:1s;
}

#result{
font-size:42px;
opacity:0;
transition:1s;
font-weight:bold;
margin-top:20px;
}

.float{
position:fixed;
bottom:-40px;
font-size:26px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<h2>🎂 ケーキを5回タップしてね 🎂</h2>

<div id="cake">
🎂
<div id="crack" class="crack">│</div>
</div>

<div id="result"></div>

<script>

/* 性別変更ここだけ */
const gender="girl"; // boy or girl

const cake=document.getElementById("cake");
const crack=document.getElementById("crack");
const result=document.getElementById("result");

let tap=0;

cake.addEventListener("click",()=>{

tap++;

cake.classList.add("shake");
setTimeout(()=>cake.classList.remove("shake"),250);

if(tap===1){
crack.style.opacity=1;
crack.textContent="│";
}

if(tap===2){
crack.textContent="┃";
}

if(tap===3){
crack.textContent="╿";
}

if(tap===4){
cake.style.transform="scale(1.05)";
}

if(tap===5){
reveal();
}

});

function reveal(){

cake.innerHTML="🍰 🍰";

const parts=cake.children;

setTimeout(()=>{
parts[0].classList.add("split-left");
parts[1].classList.add("split-right");
},50);

if(gender==="boy"){
document.body.style.background="#d8ecff";
result.textContent="💙 Boy 💙";
spawn("💙","🫧");
}else{
document.body.style.background="#ffdbe6";
result.textContent="💗 Girl 💗";
spawn("💗","🫧");
}

result.style.opacity=1;
}

function spawn(a,b){
for(let i=0;i<45;i++){
setTimeout(()=>{
const el=document.createElement("div");
el.className="float";
el.textContent=Math.random()>0.5?a:b;
el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(Math.random()*3+4)+"s";
document.body.appendChild(el);
setTimeout(()=>el.remove(),7000);
},i*120);
}
}

</script>

</body>
</html>
