<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:sans-serif;
  background:#fffaf5;
  overflow:hidden;
}

h1{
  color:#666;
}

#balloon{
  font-size:120px;
  cursor:pointer;
  transition:transform 0.2s;
}

#balloon:active{
  transform:scale(0.9);
}

#result{
  font-size:42px;
  margin-top:20px;
  opacity:0;
  transition:1s;
  font-weight:bold;
}

.particle{
  position:fixed;
  width:12px;
  height:12px;
  border-radius:50%;
  top:50%;
  left:50%;
  animation:explode 1s forwards;
}

@keyframes explode{
  to{
    transform:
      translate(var(--x), var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<h1>🎈タップしてね🎈</h1>

<div id="balloon">🎈</div>

<div id="result"></div>

<script>

/* ===== 性別設定（ここだけ変更）===== */
/* "boy" または "girl" */
const gender = "girl";
/* ================================= */

const balloon = document.getElementById("balloon");
const result = document.getElementById("result");

balloon.addEventListener("click", reveal);

function reveal(){

  balloon.textContent="💥";

  if(gender==="boy"){
    document.body.style.background="#d8ecff";
    result.textContent="💙 Boy 💙";
    explode("#6bbcff");
  }else{
    document.body.style.background="#ffdbe6";
    result.textContent="💗 Girl 💗";
    explode("#ff8fb1");
  }

  result.style.opacity=1;
}

function explode(color){

  for(let i=0;i<60;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.background=color;

    const x=(Math.random()-0.5)*600+"px";
    const y=(Math.random()-0.5)*600+"px";

    p.style.setProperty("--x",x);
    p.style.setProperty("--y",y);

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),1000);
  }
}

</script>

</body>
</html>
