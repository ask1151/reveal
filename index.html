<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Reveal Cake</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:sans-serif;
  background:#fffaf5;
  text-align:center;
  overflow:hidden;
}

h1{
  color:#666;
}

#cake{
  font-size:120px;
  cursor:pointer;
  transition:0.3s;
}

#cake:active{
  transform:scale(0.9);
}

#count{
  font-size:50px;
  margin-top:20px;
  font-weight:bold;
}

#result{
  font-size:42px;
  opacity:0;
  transition:1s;
  font-weight:bold;
  margin-top:20px;
}

.particle{
  position:fixed;
  width:12px;
  height:12px;
  border-radius:50%;
  top:50%;
  left:50%;
  animation:explode 1.2s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<h1>🎂 ケーキをタップしてね 🎂</h1>

<div id="cake">🎂</div>
<div id="count"></div>
<div id="result"></div>

<!-- 音楽（無料音源） -->
<audio id="music">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=beautiful-piano-ambient-113997.mp3">
</audio>

<script>

/* ===== 性別変更ここだけ ===== */
const gender="girl";
/* =========================== */

const cake=document.getElementById("cake");
const count=document.getElementById("count");
const result=document.getElementById("result");
const music=document.getElementById("music");

cake.addEventListener("click",startReveal);

function startReveal(){

  cake.style.pointerEvents="none";
  music.play();

  let time=10;
  count.textContent=time;

  const timer=setInterval(()=>{
    time--;
    count.textContent=time;

    if(time===0){
      clearInterval(timer);
      reveal();
    }
  },1000);
}

function reveal(){

  cake.textContent="🍰";

  if(gender==="boy"){
    document.body.style.background="#d8ecff";
    result.textContent="💙 Boy 💙";
    explode("#6bbcff");
  }else{
    document.body.style.background="#ffdbe6";
    result.textContent="💗 Girl 💗";
    explode("#ff8fb1");
  }

  count.textContent="";
  result.style.opacity=1;
}

function explode(color){

  for(let i=0;i<70;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.background=color;

    const x=(Math.random()-0.5)*700+"px";
    const y=(Math.random()-0.5)*700+"px";

    p.style.setProperty("--x",x);
    p.style.setProperty("--y",y);

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),1200);
  }
}

</script>

</body>
</html>
