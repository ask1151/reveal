<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fffaf5;
overflow:hidden;
}

#cake{
width:80%;
max-width:350px;
cursor:pointer;
transition:0.2s;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

/* キラキラ */
.sparkle{
position:fixed;
font-size:22px;
animation:float 2s linear forwards;
}

@keyframes float{
to{
transform:translateY(-200px);
opacity:0;
}
}

/* 性別表示（じんわり） */
#result{
position:absolute;
top:45%;
opacity:0;
transition:opacity 2.5s ease;
}

#result img{
width:220px;
}

.show{
opacity:1;
}

</style>
</head>

<body>

<img src="cake.png" id="cake">

<div id="result"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const gender="girl"; // ← boy に変えるだけ

const cake=document.getElementById("cake");
const result=document.getElementById("result");
const music=document.getElementById("music");

let tap=0;

cake.addEventListener("click",()=>{

tap++;

cake.classList.add("shake");
setTimeout(()=>cake.classList.remove("shake"),400);

sparkles();

if(tap===3){
reveal();
}

});

function sparkles(){
for(let i=0;i<10;i++){
const s=document.createElement("div");
s.className="sparkle";
s.textContent="✨";
s.style.left=Math.random()*100+"vw";
s.style.top="60%";
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
}

function reveal(){

/* 性別画像セット */
if(gender==="boy"){
result.innerHTML='<img src="boy.png">';
}else{
result.innerHTML='<img src="girl.png">';
}

/* 音楽再生 */
music.currentTime=0;
music.play();

/* じんわり表示 */
setTimeout(()=>{
result.classList.add("show");
},200);

}

</script>

</body>
</html>
