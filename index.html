<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#fffafc;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
}

.container{
  position:relative;
  width:90vw;
  max-width:420px;
}

.cake{
  width:100%;
  transition:0.2s;
}

/* 震え */
.shake{
  animation:shake 0.4s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-4px);}
  50%{transform:translateX(4px);}
  75%{transform:translateX(-4px);}
  100%{transform:translateX(0);}
}

/* キラキラ */
.sparkle{
  position:absolute;
  font-size:20px;
  animation:floatUp 1.5s linear forwards;
}

@keyframes floatUp{
  from{opacity:1; transform:translateY(0);}
  to{opacity:0; transform:translateY(-120px);}
}

/* 性別表示 */
.result{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:42px;
  font-weight:bold;
  opacity:0;
  transition:0.6s;
}

.show{
  opacity:1;
}

/* ハート泡 */
.float{
  position:absolute;
  animation:bubble 4s linear forwards;
}

@keyframes bubble{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(-600px);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container" onclick="tapCake()">

<img src="cake.png" class="cake" id="cake">

<div id="result" class="result"></div>

</div>

<script>
let tapCount = 0;

/* 性別設定（ここだけ変更） */
const gender = "GIRL"; // BOY に変えればOK

function tapCake(){

  tapCount++;

  const cake = document.getElementById("cake");

  /* 震え */
  cake.classList.add("shake");
  setTimeout(()=>cake.classList.remove("shake"),400);

  sparkleEffect();

  if(tapCount === 3){
      revealGender();
  }
}

function sparkleEffect(){
  const container=document.querySelector(".container");

  for(let i=0;i<8;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.innerHTML="✨";

    s.style.left=Math.random()*100+"%";
    s.style.top="60%";

    container.appendChild(s);

    setTimeout(()=>s.remove(),1500);
  }
}

function revealGender(){

  const result=document.getElementById("result");

  if(gender==="GIRL"){
    result.innerHTML="GIRL 🩷";
    result.style.color="#ff6fa5";
  }else{
    result.innerHTML="BOY 💙";
    result.style.color="#6fa8ff";
  }

  result.classList.add("show");

  floatingHearts();
}

function floatingHearts(){
  const container=document.querySelector(".container");

  for(let i=0;i<20;i++){
    const f=document.createElement("div");
    f.className="float";
    f.innerHTML=Math.random()>0.5?"💖":"🫧";

    f.style.left=Math.random()*100+"%";
    f.style.top="70%";
    f.style.fontSize=(20+Math.random()*20)+"px";

    container.appendChild(f);

    setTimeout(()=>f.remove(),4000);
  }
}
</script>

</body>
</html>
