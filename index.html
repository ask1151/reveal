<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#fffaf5;
overflow:hidden;
}

/* ステージ中央 */
#stage{
position:relative;
width:80%;
max-width:360px;
aspect-ratio:1/1;
cursor:pointer;
}

/* 画像中央固定 */
#cake,
#resultImg{
width:100%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#cake{
transition:opacity 2.8s ease;
}

#resultImg{
opacity:0;
transition:opacity 4s ease;
}

/* 揺れ */
.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(-50%,-50%)}
25%{transform:translate(-50%,-50%) translateX(-6px)}
50%{transform:translate(-50%,-50%) translateX(6px)}
75%{transform:translate(-50%,-50%) translateX(-4px)}
100%{transform:translate(-50%,-50%)}
}

/* ✨キラキラ */
.sparkle{
position:fixed;
pointer-events:none;
animation:sparkleFloat linear forwards;
}

@keyframes sparkleFloat{
0%{
transform:translateY(0) scale(0.4);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-300px) scale(1.3);
opacity:0;
}
}

/* 🫧シャボン玉 */
.bubble{
position:fixed;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,
rgba(255,255,255,0.9),
rgba(255,255,255,0.15));
pointer-events:none;
animation:bubbleUp linear forwards;
}

@keyframes bubbleUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-130vh);opacity:0;}
}

</style>
</head>

<body>

<div id="stage">
<img src="cake.png" id="cake">
<img src="girl.png" id="resultImg">
</div>

<audio id="music" src="music.mp3"></audio>

<script>

const stage=document.getElementById("stage");
const cake=document.getElementById("cake");
const result=document.getElementById("resultImg");
const music=document.getElementById("music");

let tap=0;

stage.addEventListener("click",()=>{

tap++;

cake.classList.add("shake");
setTimeout(()=>cake.classList.remove("shake"),400);

/* 毎回キラキラ */
sparkleBurst();

if(tap===3){
reveal();
}

});

/* ✨ランダムキラキラ */
function sparkleBurst(){

for(let i=0;i<22;i++){

setTimeout(()=>{

const s=document.createElement("div");
s.className="sparkle";
s.textContent=Math.random()>0.5?"✨":"⭐";

s.style.left=Math.random()*100+"vw";
s.style.top=(Math.random()*80+10)+"vh";
s.style.fontSize=(Math.random()*20+12)+"px";
s.style.animationDuration=(Math.random()*2+1.5)+"s";

document.body.appendChild(s);
setTimeout(()=>s.remove(),3500);

},i*70);
}
}

/* 🫧シャボン玉 */
function bubbleBurst(){

for(let i=0;i<30;i++){

setTimeout(()=>{

const b=document.createElement("div");
b.className="bubble";

const size=Math.random()*50+15;

b.style.width=size+"px";
b.style.height=size+"px";
b.style.left=Math.random()*100+"vw";
b.style.bottom="-80px";
b.style.animationDuration=(Math.random()*5+6)+"s";

document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);

},i*120);
}
}

/* 🎉 発表演出 */
function reveal(){

/* ⭐音楽は即スタート */
music.currentTime=0;
music.play();

/* 期待感キラキラ */
sparkleBurst();

/* ⭐3秒待ってから変身 */
setTimeout(()=>{

cake.style.opacity="0";
result.style.opacity="1";

bubbleBurst();
sparkleBurst();

},3000);

}

</script>

</body>
</html>
