<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#fffaf5;
overflow:hidden;
}

/* 画像エリア */
#stage{
position:relative;
width:80%;
max-width:360px;
aspect-ratio:1/1;
margin:auto;
}

/* ケーキ */
#cake{
width:100%;
position:absolute;
transition:opacity 2s ease;
}

/* 性別画像 */
#resultImg{
width:100%;
position:absolute;
opacity:0;
transition:opacity 3s ease;
}

/* キラキラ */
.sparkle{
position:fixed;
font-size:22px;
animation:float 2s linear forwards;
}

@keyframes float{
to{
transform:translateY(-200px);
opacity:0;
}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<div id="stage">

<img src="cake.png" id="cake">
<img src="girl.png" id="resultImg">

</div>

<audio id="music" src="music.mp3"></audio>

<script>

const cake=document.getElementById("cake");
const result=document.getElementById("resultImg");
const music=document.getElementById("music");

let tap=0;

document.getElementById("stage").addEventListener("click",()=>{

tap++;

cake.classList.add("shake");
setTimeout(()=>cake.classList.remove("shake"),400);

sparkle();

if(tap===3){
reveal();
}

});

function sparkle(){
for(let i=0;i<10;i++){
const s=document.createElement("div");
s.className="sparkle";
s.textContent="✨";
s.style.left=Math.random()*100+"vw";
s.style.top="60%";
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
}

function reveal(){

music.currentTime=0;
music.play();

/* ゆっくり切替 */
cake.style.opacity="0";
result.style.opacity="1";

}

</script>

</body>
</html>
