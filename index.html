<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

*{
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  box-sizing: border-box;
}

html, body{
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #fffaf5;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

#stage{
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  height: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  cursor: pointer;
  touch-action: manipulation;
}

#cake,
#resultImg{
  position: absolute;
  top: calc(-1 * env(safe-area-inset-top));
  left: calc(-1 * env(safe-area-inset-left));
  width: calc(100% + env(safe-area-inset-left) + env(safe-area-inset-right));
  height: calc(100% + env(safe-area-inset-top) + env(safe-area-inset-bottom));
  object-fit: cover;
  object-position: center;
}

#cake{
  transition: opacity 2.8s ease;
}

#resultImg{
  opacity: 0;
  transition: opacity 4s ease;
}

.shake{
  animation: shake 0.4s;
}

@keyframes shake{
  0%  { transform: translateX(0) }
  25% { transform: translateX(-6px) }
  50% { transform: translateX(6px) }
  75% { transform: translateX(-4px) }
  100%{ transform: translateX(0) }
}

.sparkle{
  position: fixed;
  pointer-events: none;
  animation: sparkleFloat linear forwards;
}

@keyframes sparkleFloat{
  0%  { transform: translateY(0) scale(0.4); opacity: 0; }
  20% { opacity: 1; }
  100%{ transform: translateY(-300px) scale(1.3); opacity: 0; }
}

.bubble{
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,
    rgba(255,255,255,0.9),
    rgba(255,255,255,0.15));
  pointer-events: none;
  animation: bubbleUp linear forwards;
}

@keyframes bubbleUp{
  0%  { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100%{ transform: translateY(-130vh); opacity: 0; }
}

</style>
</head>

<body>

<div id="stage">
  <img src="cake2.png" id="cake">
  <img src="girl3.png" id="resultImg">
</div>

<audio id="music" src="music.mp3"></audio>

<script>

const stage  = document.getElementById("stage");
const cake   = document.getElementById("cake");
const result = document.getElementById("resultImg");
const music  = document.getElementById("music");

let tap = 0;

stage.addEventListener("touchend", handleTap, { passive: true });
stage.addEventListener("click", handleTap);

let lastTap = 0;
function handleTap(e){
  const now = Date.now();
  if(now - lastTap < 300) return;
  lastTap = now;

  tap++;

  cake.classList.add("shake");
  setTimeout(() => cake.classList.remove("shake"), 400);

  sparkleBurst();

  if(tap === 3){
    reveal();
  }
}

function sparkleBurst(){
  for(let i = 0; i < 22; i++){
    setTimeout(() => {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.textContent = Math.random() > 0.5 ? "✨" : "⭐";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top  = (Math.random() * 80 + 10) + "vh";
      s.style.fontSize = (Math.random() * 20 + 12) + "px";
      s.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 3500);
    }, i * 70);
  }
}

function bubbleBurst(){
  for(let i = 0; i < 30; i++){
    setTimeout(() => {
      const b = document.createElement("div");
      b.className = "bubble";
      const size = Math.random() * 50 + 15;
      b.style.width  = size + "px";
      b.style.height = size + "px";
      b.style.left   = Math.random() * 100 + "vw";
      b.style.bottom = "-80px";
      b.style.animationDuration = (Math.random() * 5 + 6) + "s";
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 10000);
    }, i * 120);
  }
}

function reveal(){
  music.currentTime = 0;
  music.play().catch(() => {});

  sparkleBurst();

  setTimeout(() => {
    cake.style.opacity  = "0";
    result.style.opacity = "1";
    bubbleBurst();
    sparkleBurst();
  }, 3000);
}

</script>

</body>
</html>
